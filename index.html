<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ping Pong — Seletor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #0d0d0d;
      overflow: hidden;
    }

    .frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
    }

    .frame.active {
      display: block;
    }
  </style>
</head>
<body>
  <noscript style="color: #fff; font-family: Segoe UI, sans-serif; padding: 16px; display: block;">
    Ative o JavaScript para jogar.
  </noscript>

  <iframe id="frame-desktop" class="frame active" src="ping_pong_desktop.html" title="Ping Pong (Desktop)"></iframe>
  <iframe id="frame-mobile" class="frame" src="ping_pong_mobile_v2.html" title="Ping Pong (Mobile)"></iframe>

  <script>
    // Detectar se é mobile e carregar a versão apropriada
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    const desktopFrame = document.getElementById('frame-desktop');
    const mobileFrame = document.getElementById('frame-mobile');

    if (isMobile) {
      desktopFrame.classList.remove('active');
      mobileFrame.classList.add('active');
    } else {
      desktopFrame.classList.add('active');
      mobileFrame.classList.remove('active');
    }

    // Permitir trocar entre versões com tecla 'V'
    document.addEventListener('keydown', e => {
      if (e.key === 'v' || e.key === 'V') {
        desktopFrame.classList.toggle('active');
        mobileFrame.classList.toggle('active');
      }
    });
  </script>

</body>
</html>
