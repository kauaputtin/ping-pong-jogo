<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ping Pong</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 1rem;
    }

    #scoreboard {
      display: flex;
      gap: 3rem;
      margin-bottom: 1rem;
      font-size: 2rem;
      font-weight: 500;
    }

    .score-block { text-align: center; }
    .score-label { font-size: 0.7rem; color: #555; letter-spacing: 2px; display: block; margin-bottom: 4px; }

    #game-canvas {
      border: 1px solid #222;
      border-radius: 6px;
      display: block;
    }

    #controls {
      display: flex;
      gap: 10px;
      margin-top: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: transparent;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    button:hover:not(:disabled) { background: #1e1e1e; color: #fff; }
    button:disabled { opacity: 0.35; cursor: default; }

    #msg {
      font-size: 0.8rem;
      color: #555;
      margin-top: 0.75rem;
    }

    .hint {
      font-size: 0.72rem;
      color: #3a3a3a;
      margin-top: 0.4rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <h1>Ping Pong</h1>

  <div id="scoreboard">
    <div class="score-block">
      <span class="score-label" id="label-left">JOGADOR</span>
      <span id="score-left">0</span>
    </div>
    <div style="color:#333; line-height:2.2;">:</div>
    <div class="score-block">
      <span class="score-label" id="label-right">CPU</span>
      <span id="score-right">0</span>
    </div>
  </div>

  <canvas id="game-canvas" width="640" height="380"></canvas>

  <div id="controls">
    <button id="btn-start"  onclick="Game.start()">Iniciar</button>
    <button id="btn-pause"  onclick="Game.togglePause()" disabled>Pausar</button>
    <button id="btn-reset"  onclick="Game.reset()">Reiniciar</button>
    <button id="btn-mode"   onclick="Game.toggleMode()">2 Jogadores</button>
  </div>

  <p class="hint" id="hint">W / S  -  mover raquete</p>
  <p id="msg">Pressione Iniciar para jogar</p>

  <script>
    // ─────────────────────────────────────────────────────
    //  PING PONG — código estruturado em módulos
    // ─────────────────────────────────────────────────────

    const Game = (() => {

      // ── Canvas setup ────────────────────────────────────
      const canvas = document.getElementById('game-canvas');
      const ctx    = canvas.getContext('2d');
      const W = canvas.width;
      const H = canvas.height;

      // ── Constantes ───────────────────────────────────────
      const PADDLE_W     = 10;
      const PADDLE_H     = 70;
      const PADDLE_SPEED = 5;
      const BALL_RADIUS  = 9;
      const CPU_SPEED    = 3.8;
      const WINNING_SCORE = 7;

      // ── Estado global ────────────────────────────────────
      let running  = false;
      let paused   = false;
      let gameOver = false;
      let animId   = null;
      let scores   = { left: 0, right: 0 };
      let leftPaddle, rightPaddle, ball;
      let mode = 'cpu'; // 'cpu' | 'pvp'

      const labelLeft = document.getElementById('label-left');
      const labelRight = document.getElementById('label-right');
      const hintEl = document.getElementById('hint');
      const btnMode = document.getElementById('btn-mode');

      function updateModeUI() {
        if (mode === 'cpu') {
          if (labelLeft) labelLeft.textContent = 'JOGADOR';
          if (labelRight) labelRight.textContent = 'CPU';
          if (btnMode) btnMode.textContent = '2 Jogadores';
          if (hintEl) hintEl.textContent = 'W / S  -  mover raquete';
        } else {
          if (labelLeft) labelLeft.textContent = 'JOGADOR 1';
          if (labelRight) labelRight.textContent = 'JOGADOR 2';
          if (btnMode) btnMode.textContent = '1 Jogador';
          if (hintEl) hintEl.textContent = 'P1: W/S  -  P2: setas';
        }
      }

      // ── Teclado ─────────────────────────────────────────
      const keys = {};
      document.addEventListener('keydown', e => {
        keys[e.key] = true;
        if (['w','s','W','S','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
      });
      document.addEventListener('keyup', e => { keys[e.key] = false; });

      // ── Inicialização ────────────────────────────────────
      function initState() {
        leftPaddle = {
          x: 18,
          y: H / 2 - PADDLE_H / 2,
          w: PADDLE_W,
          h: PADDLE_H
        };
        rightPaddle = {
          x: W - 18 - PADDLE_W,
          y: H / 2 - PADDLE_H / 2,
          w: PADDLE_W,
          h: PADDLE_H
        };
        scores = { left: 0, right: 0 };
        ball = spawnBall();
        updateScoreUI();
      }

      // ── Lógica da bola ───────────────────────────────────
      function spawnBall() {
        const angle = (Math.random() * 0.5 + 0.2) * (Math.random() < 0.5 ? 1 : -1);
        const speed = 6.0;
        return {
          x:  W / 2,
          y:  H / 2,
          vx: speed * Math.cos(angle) * (Math.random() < 0.5 ? 1 : -1),
          vy: speed * Math.sin(angle),
          r:  BALL_RADIUS
        };
      }

      function moveBall() {
        ball.x += ball.vx;
        ball.y += ball.vy;

        // Colisão com paredes (topo/fundo)
        if (ball.y - ball.r <= 0)  { ball.y = ball.r;     ball.vy *= -1; }
        if (ball.y + ball.r >= H)  { ball.y = H - ball.r; ball.vy *= -1; }

        // Colisão com paddle esquerdo (jogador)
        if (collidesAABB(ball, leftPaddle)) {
          ball.x = leftPaddle.x + leftPaddle.w + ball.r;
          reflectBall(ball, leftPaddle, +1);
        }

        // Colisão com paddle direito (CPU)
        if (collidesAABB(ball, rightPaddle)) {
          ball.x = rightPaddle.x - ball.r;
          reflectBall(ball, rightPaddle, -1);
        }

        // Saiu pela esquerda → ponto para CPU
        if (ball.x + ball.r < 0) {
          scores.right++;
          handlePoint(mode === 'cpu' ? 'CPU' : 'Jogador 2');
        }

        // Saiu pela direita → ponto para o jogador
        if (ball.x - ball.r > W) {
          scores.left++;
          handlePoint(mode === 'cpu' ? 'Jogador' : 'Jogador 1');
        }
      }

      function reflectBall(b, paddle, direction) {
        const offset = (b.y - (paddle.y + paddle.h / 2)) / (paddle.h / 2);
        const speed  = Math.min(Math.sqrt(b.vx ** 2 + b.vy ** 2) * 1.04, 18);
        const angle  = offset * 0.85;
        b.vx = direction * Math.abs(speed * Math.cos(angle));
        b.vy = speed * Math.sin(angle);
      }

      function collidesAABB(b, p) {
        return b.x - b.r < p.x + p.w &&
               b.x + b.r > p.x &&
               b.y - b.r < p.y + p.h &&
               b.y + b.r > p.y;
      }

      // ── Paddles ──────────────────────────────────────────
      function movePlayerPaddle() {
        if (keys['w'] || keys['W']) leftPaddle.y -= PADDLE_SPEED;
        if (keys['s'] || keys['S']) leftPaddle.y += PADDLE_SPEED;
        leftPaddle.y = clamp(leftPaddle.y, 0, H - PADDLE_H);
      }

      function movePlayer2Paddle() {
        if (keys['ArrowUp']) rightPaddle.y -= PADDLE_SPEED;
        if (keys['ArrowDown']) rightPaddle.y += PADDLE_SPEED;
        rightPaddle.y = clamp(rightPaddle.y, 0, H - PADDLE_H);
      }

      function moveCPUPaddle() {
        const center = rightPaddle.y + PADDLE_H / 2;
        if (center < ball.y - 6) rightPaddle.y += CPU_SPEED;
        else if (center > ball.y + 6) rightPaddle.y -= CPU_SPEED;
        rightPaddle.y = clamp(rightPaddle.y, 0, H - PADDLE_H);
      }

      // ── Pontuação / vitória ──────────────────────────────
      function handlePoint(scorer) {
        updateScoreUI();
        if (scores.left >= WINNING_SCORE || scores.right >= WINNING_SCORE) {
          endGame(scorer);
        } else {
          ball = spawnBall();
        }
      }

      function endGame(winner) {
        gameOver = true;
        running  = false;
        setMsg(`${winner} venceu! Pressione Reiniciar para jogar novamente.`);
        document.getElementById('btn-pause').disabled = true;
        document.getElementById('btn-start').disabled = true;
      }

      // ── Renderização ─────────────────────────────────────
      function drawBackground() {
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, W, H);

        ctx.setLineDash([8, 8]);
        ctx.strokeStyle = '#2a2a2a';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(W / 2, 0);
        ctx.lineTo(W / 2, H);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      function drawPaddle(p, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        const radius = 4;
        if (typeof ctx.roundRect === 'function') {
          ctx.roundRect(p.x, p.y, p.w, p.h, radius);
        } else if (typeof ctx.arcTo === 'function') {
          const r = Math.min(radius, p.w / 2, p.h / 2);
          const x = p.x, y = p.y, w = p.w, h = p.h;
          ctx.moveTo(x + r, y);
          ctx.arcTo(x + w, y, x + w, y + h, r);
          ctx.arcTo(x + w, y + h, x, y + h, r);
          ctx.arcTo(x, y + h, x, y, r);
          ctx.arcTo(x, y, x + w, y, r);
          ctx.closePath();
        } else {
          ctx.rect(p.x, p.y, p.w, p.h);
        }
        ctx.fill();
      }

      function drawBall() {
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fill();
      }

      function draw() {
        drawBackground();
        drawPaddle(leftPaddle,  '#60a5fa');
        drawPaddle(rightPaddle, '#f87171');
        drawBall();
      }

      // ── Game loop ────────────────────────────────────────
      function loop() {
        if (!running || paused || gameOver) return;
        movePlayerPaddle();
        if (mode === 'cpu') moveCPUPaddle();
        else movePlayer2Paddle();
        moveBall();
        draw();
        animId = requestAnimationFrame(loop);
      }

      // ── Utilitários ──────────────────────────────────────
      function clamp(val, min, max) {
        return Math.max(min, Math.min(max, val));
      }

      function updateScoreUI() {
        document.getElementById('score-left').textContent  = scores.left;
        document.getElementById('score-right').textContent = scores.right;
      }

      function setMsg(text) {
        document.getElementById('msg').textContent = text;
      }

      // ── API pública ──────────────────────────────────────
      function start() {
        if (gameOver || running) return;
        running = true;
        paused  = false;
        document.getElementById('btn-start').disabled = true;
        document.getElementById('btn-pause').disabled = false;
        setMsg(mode === 'cpu'
          ? 'Use W e S para mover. Boa sorte!'
          : 'P1: W/S | P2: setas');
        loop();
      }

      function togglePause() {
        if (!running || gameOver) return;
        paused = !paused;
        const btn = document.getElementById('btn-pause');
        btn.textContent = paused ? 'Continuar' : 'Pausar';
        if (!paused) { setMsg(''); loop(); }
        else setMsg('Pausado');
      }

      function reset() {
        cancelAnimationFrame(animId);
        running  = false;
        paused   = false;
        gameOver = false;
        initState();
        draw();
        document.getElementById('btn-start').disabled = false;
        document.getElementById('btn-pause').disabled = true;
        document.getElementById('btn-pause').textContent = 'Pausar';
        setMsg('Pressione Iniciar para jogar');
      }

      function toggleMode() {
        mode = mode === 'cpu' ? 'pvp' : 'cpu';
        reset();
        updateModeUI();
      }

      // ── Boot ─────────────────────────────────────────────
      initState();
      updateModeUI();
      draw();

      return { start, togglePause, reset, toggleMode };

    })();
  </script>

</body>
</html>

  <script>
    // ─────────────────────────────────────────────────────

    // ─────────────────────────────────────────────────────

    const Game = (() => {

      const ctx    = canvas.getContext('2d');
      const W = canvas.width;
      const H = canvas.height;

      const PADDLE_H     = 10;
      const PADDLE_SPEED = 5;
      const BALL_RADIUS  = 9;
      const CPU_SPEED    = 3.8;
      const WINNING_SCORE = 7;

      // ── Estado global ────────────────────────────────────
      let running  = false;
      let paused   = false;
      let gameOver = false;
      let animId   = null;
      let scores   = { left: 0, right: 0 };
      let leftPaddle, rightPaddle, ball;
      let mode = 'cpu'; // 'cpu' | 'pvp'

      // ── Touch/Mobile controls ───────────────────────────
      const p1Keys = { left: false, right: false };
      const p2Keys = { left: false, right: false };

      const btnP1Left  = document.getElementById('btn-p1-left');
      const btnP1Right = document.getElementById('btn-p1-right');
      const btnP2Left  = document.getElementById('btn-p2-left');
      const btnP2Right = document.getElementById('btn-p2-right');

      const labelLeft = document.getElementById('label-left');
      const labelRight = document.getElementById('label-right');
      const hintEl = document.getElementById('hint');
      const p2Controls = document.getElementById('p2-controls');
      const countdownEl = document.getElementById('countdown');
      const startMenuEl = document.getElementById('start-menu');
      const menu1pBtn = document.getElementById('menu-1p');
      const menu2pBtn = document.getElementById('menu-2p');
      const pauseBtn = document.getElementById('btn-pause');

      let countdownUntil = 0;
      let lastCountdownShown = null;
      let serveAnim = null;

      function setupTouchBtn(elem, keyObj, key) {
        if (!elem) return;
        const events = ['touchstart', 'mousedown'];
        const eventsEnd = ['touchend', 'mouseup', 'mouseleave'];

        events.forEach(evt => {
          elem.addEventListener(evt, e => {
            e.preventDefault();
            keyObj[key] = true;
            elem.classList.add('active');
          });
        });

        eventsEnd.forEach(evt => {
          elem.addEventListener(evt, e => {
            e.preventDefault();
            keyObj[key] = false;
            elem.classList.remove('active');
          });
        });
      }

      setupTouchBtn(btnP1Left,  p1Keys, 'left');
      setupTouchBtn(btnP1Right, p1Keys, 'right');
      setupTouchBtn(btnP2Left,  p2Keys, 'left');
      setupTouchBtn(btnP2Right, p2Keys, 'right');

      function updateModeUI() {
        if (mode === 'cpu') {
          if (labelLeft) labelLeft.textContent = 'CPU';
          if (labelRight) labelRight.textContent = 'JOGADOR';
          if (hintEl) hintEl.textContent = 'P1: botões de baixo (< >)';
          if (p2Controls) p2Controls.classList.add('hidden');
        } else {
          if (labelLeft) labelLeft.textContent = 'JOGADOR 1';
          if (labelRight) labelRight.textContent = 'JOGADOR 2';
          if (hintEl) hintEl.textContent = 'P1: botões de baixo | P2: botões de cima';
          if (p2Controls) p2Controls.classList.remove('hidden');
        }
      }

      if (menu1pBtn) menu1pBtn.addEventListener('click', () => startNewMatch('cpu'));
      if (menu2pBtn) menu2pBtn.addEventListener('click', () => startNewMatch('pvp'));

      // ── Teclado ─────────────────────────────────────────
      const keys = {};
      document.addEventListener('keydown', e => {
        keys[e.key] = true;
        if (['w','s','W','S','a','d','A','D','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
      });
      document.addEventListener('keyup', e => { keys[e.key] = false; });

      // ── Inicialização ────────────────────────────────────
      function initState(resetScore = true) {
        // Em modo retrato: CPU no topo, jogador embaixo
        rightPaddle = {
          x: W / 2 - PADDLE_W / 2,
          y: 18,
          w: PADDLE_W,
          h: PADDLE_H
        };
        leftPaddle = {
          x: W / 2 - PADDLE_W / 2,
          y: H - 18 - PADDLE_H,
          w: PADDLE_W,
          h: PADDLE_H
        };
        if (resetScore) scores = { left: 0, right: 0 };
        ball = null;
        updateScoreUI();
      }

      // ── Lógica da bola ───────────────────────────────────
      function spawnBall() {
        const speed = 6.0;
        const direction = Math.random() < 0.5 ? 1 : -1;
        return {
          x:  W / 2,
          y:  H / 2,
          vx: (Math.random() - 0.5) * 2,  // Pequeno movimento horizontal
          vy: direction * speed,           // Movimento vertical principal
          r:  BALL_RADIUS
        };
      }

      function beginServeDrop() {
        const next = spawnBall();
        const startR = BALL_RADIUS * 3.4;
        serveAnim = {
          start: performance.now(),
          duration: 520,
          startR,
          endR: BALL_RADIUS,
          vx: next.vx,
          vy: next.vy
        };
        ball = { x: next.x, y: next.y, vx: 0, vy: 0, r: startR };
      }

      function moveBall(now) {
        if (!ball) return;

        if (serveAnim) {
          const t = clamp((now - serveAnim.start) / serveAnim.duration, 0, 1);
          const eased = 1 - Math.pow(1 - t, 3); // easeOutCubic
          ball.r = serveAnim.startR + (serveAnim.endR - serveAnim.startR) * eased;
          if (t >= 1) {
            ball.r = serveAnim.endR;
            ball.vx = serveAnim.vx;
            ball.vy = serveAnim.vy;
            serveAnim = null;
          }
          return;
        }

        ball.x += ball.vx;
        ball.y += ball.vy;

        // Colisão com paredes (esquerda/direita)
        if (ball.x - ball.r <= 0)  { ball.x = ball.r;     ball.vx *= -1; }
        if (ball.x + ball.r >= W)  { ball.x = W - ball.r; ball.vx *= -1; }

        // Colisão com paddle direito (CPU - topo)
        if (collidesAABB(ball, rightPaddle)) {
          ball.y = rightPaddle.y + rightPaddle.h + ball.r;
          reflectBall(ball, rightPaddle, +1);
        }

        // Colisão com paddle esquerdo (jogador - baixo)
        if (collidesAABB(ball, leftPaddle)) {
          ball.y = leftPaddle.y - ball.r;
          reflectBall(ball, leftPaddle, -1);
        }

        // Saiu pelo topo → ponto para CPU
        if (ball.y + ball.r < 0) {
          if (mode === 'cpu') {
            scores.right++;
            handlePoint('CPU');
          } else {
            scores.left++;
            handlePoint('Jogador 1');
          }
        }

        // Saiu pelo fundo → ponto para o jogador
        if (ball.y - ball.r > H) {
          if (mode === 'cpu') {
            scores.left++;
            handlePoint('Jogador');
          } else {
            scores.right++;
            handlePoint('Jogador 2');
          }
        }
      }

      function reflectBall(b, paddle, direction) {
        const offset = (b.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        const speed  = Math.min(Math.sqrt(b.vx ** 2 + b.vy ** 2) * 1.04, 18);
        const angle  = offset * 0.85;
        // Em modo retrato (paddles horizontais): varia o X pelo impacto e reflete no Y
        b.vx = speed * Math.sin(angle);
        b.vy = direction * Math.abs(speed * Math.cos(angle));
      }

      function collidesAABB(b, p) {
        return b.x - b.r < p.x + p.w &&
               b.x + b.r > p.x &&
               b.y - b.r < p.y + p.h &&
               b.y + b.r > p.y;
      }

      // ── Paddles ──────────────────────────────────────────
      function movePlayerPaddle() {
        // Suporte a teclado (A/D para esquerda/direita)
        if (keys['a'] || keys['A'] || (mode === 'cpu' && keys['ArrowLeft'])) leftPaddle.x -= PADDLE_SPEED;
        if (keys['d'] || keys['D'] || (mode === 'cpu' && keys['ArrowRight'])) leftPaddle.x += PADDLE_SPEED;
        // Suporte a botões mobile
        if (p1Keys.left) leftPaddle.x -= PADDLE_SPEED;
        if (p1Keys.right) leftPaddle.x += PADDLE_SPEED;
        leftPaddle.x = clamp(leftPaddle.x, 0, W - PADDLE_W);
      }

      function movePlayer2Paddle() {
        if (keys['ArrowLeft'] || keys['j'] || keys['J']) rightPaddle.x -= PADDLE_SPEED;
        if (keys['ArrowRight'] || keys['l'] || keys['L']) rightPaddle.x += PADDLE_SPEED;
        if (p2Keys.left) rightPaddle.x -= PADDLE_SPEED;
        if (p2Keys.right) rightPaddle.x += PADDLE_SPEED;
        rightPaddle.x = clamp(rightPaddle.x, 0, W - PADDLE_W);
      }

      function moveCPUPaddle() {
        if (!ball) return;
        const center = rightPaddle.x + PADDLE_W / 2;
        if (center < ball.x - 6) rightPaddle.x += CPU_SPEED;
        else if (center > ball.x + 6) rightPaddle.x -= CPU_SPEED;
        rightPaddle.x = clamp(rightPaddle.x, 0, W - PADDLE_W);
      }

      // ── Pontuação / vitória ──────────────────────────────
      function handlePoint(scorer) {
        updateScoreUI();
        if (scores.left >= WINNING_SCORE || scores.right >= WINNING_SCORE) {
          endGame(scorer);
        } else {
          beginServeDrop();
        }
      }

      function endGame(winner) {
        gameOver = true;
        running  = false;
        setMsg(`${winner} venceu! Toque Reiniciar para jogar novamente.`);
        if (pauseBtn) {
          pauseBtn.disabled = true;
          pauseBtn.textContent = 'Pausar';
        }
      }

      // ── Renderização ─────────────────────────────────────
      function drawBackground() {
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, W, H);

        ctx.setLineDash([8, 8]);
        ctx.strokeStyle = '#2a2a2a';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, H / 2);
        ctx.lineTo(W, H / 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      function drawPaddle(p, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        const radius = 4;
        if (typeof ctx.roundRect === 'function') {
          ctx.roundRect(p.x, p.y, p.w, p.h, radius);
        } else if (typeof ctx.arcTo === 'function') {
          const r = Math.min(radius, p.w / 2, p.h / 2);
          const x = p.x, y = p.y, w = p.w, h = p.h;
          ctx.moveTo(x + r, y);
          ctx.arcTo(x + w, y, x + w, y + h, r);
          ctx.arcTo(x + w, y + h, x, y + h, r);
          ctx.arcTo(x, y + h, x, y, r);
          ctx.arcTo(x, y, x + w, y, r);
          ctx.closePath();
        } else {
          ctx.rect(p.x, p.y, p.w, p.h);
        }
        ctx.fill();
      }

      function drawBall() {
        if (!ball) return;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fill();
      }

      function draw() {
        drawBackground();
        drawPaddle(rightPaddle, '#f87171');  // CPU/Jogador 2 - topo (vermelho)
        drawPaddle(leftPaddle,  '#60a5fa');  // Jogador - baixo (azul)
        drawBall();
      }

      // ── Game loop ────────────────────────────────────────
      function beginCountdown(seconds) {
        countdownUntil = performance.now() + seconds * 1000;
        lastCountdownShown = null;
        if (countdownEl) {
          countdownEl.classList.remove('hidden');
          countdownEl.textContent = String(seconds);
        }
      }

      function updateCountdown(now) {
        if (!countdownUntil || !countdownEl) return false;
        const remaining = countdownUntil - now;
        if (remaining <= 0) {
          countdownUntil = 0;
          lastCountdownShown = null;
          countdownEl.classList.add('hidden');
          countdownEl.textContent = '';
          return true;
        }
        const value = Math.ceil(remaining / 1000);
        if (value !== lastCountdownShown) {
          lastCountdownShown = value;
          countdownEl.textContent = String(value);
        }
        return false;
      }

      function startRally() {
        ball = spawnBall();
        if (pauseBtn) pauseBtn.disabled = false;
        setMsg('');
      }

      function loop(ts) {
        if (!running || paused || gameOver) return;
        const now = ts ?? performance.now();

        movePlayerPaddle();
        if (mode === 'cpu') moveCPUPaddle();
        else movePlayer2Paddle();

        if (countdownUntil) {
          if (updateCountdown(now)) startRally();
        } else {
          moveBall(now);
        }

        draw();
        animId = requestAnimationFrame(loop);
      }

      // ── Utilitários ──────────────────────────────────────
      function clamp(val, min, max) {
        return Math.max(min, Math.min(max, val));
      }

      function updateScoreUI() {
        document.getElementById('score-left').textContent  = scores.left;
        document.getElementById('score-right').textContent = scores.right;
      }

      function setMsg(text) {
        document.getElementById('msg').textContent = text;
      }

      // ── API pública ──────────────────────────────────────
      function openMenu() {
        cancelAnimationFrame(animId);
        running  = false;
        paused   = false;
        gameOver = false;
        countdownUntil = 0;
        lastCountdownShown = null;
        serveAnim = null;
        ball = null;
        initState(true);
        updateModeUI();
        if (startMenuEl) startMenuEl.classList.remove('hidden');
        if (countdownEl) {
          countdownEl.classList.add('hidden');
          countdownEl.textContent = '';
        }
        if (pauseBtn) {
          pauseBtn.disabled = true;
          pauseBtn.textContent = 'Pausar';
        }
        setMsg('Escolha 1 Jogador ou 2 Jogadores para começar');
        draw();
      }

      function startNewMatch(selectedMode) {
        cancelAnimationFrame(animId);
        mode = selectedMode;
        running  = true;
        paused   = false;
        gameOver = false;
        serveAnim = null;
        initState(true);
        updateModeUI();
        if (startMenuEl) startMenuEl.classList.add('hidden');
        if (pauseBtn) {
          pauseBtn.disabled = true;
          pauseBtn.textContent = 'Pausar';
        }
        beginCountdown(3);
        setMsg('Preparar...');
        draw();
        animId = requestAnimationFrame(loop);
      }

      function togglePause() {
        if (!running || gameOver) return;
        paused = !paused;
        const btn = document.getElementById('btn-pause');
        btn.textContent = paused ? 'Continuar' : 'Pausar';
        if (!paused) { setMsg(''); loop(); }
        else setMsg('Pausado');
      }

      function reset() {
        startNewMatch(mode);
      }

      // ── Boot ─────────────────────────────────────────────
      initState();
      updateModeUI();
      draw();

      return { openMenu, togglePause, reset };

    })();
  </script>

</body>

  </textarea>

  <script>
    (() => {
      const desktopFrame = document.getElementById('frame-desktop');
      const mobileFrame = document.getElementById('frame-mobile');
      const desktopStore = document.getElementById('srcdoc-desktop');
      const mobileStore = document.getElementById('srcdoc-mobile');

      const desktopSrc = (desktopStore?.value ?? '').trim();
      const mobileSrc = (mobileStore?.value ?? '').trim();

      // Libera memoria depois de extrair o conteudo.
      desktopStore?.remove();
      mobileStore?.remove();

      const mql = window.matchMedia('(pointer: coarse), (max-width: 820px)');

      function show(useMobile) {
        if (useMobile) {
          if (!mobileFrame.srcdoc) mobileFrame.srcdoc = mobileSrc;
          desktopFrame.classList.remove('active');
          mobileFrame.classList.add('active');
          try { mobileFrame.focus({ preventScroll: true }); } catch (_) {}
          return;
        }

        if (!desktopFrame.srcdoc) desktopFrame.srcdoc = desktopSrc;
        mobileFrame.classList.remove('active');
        desktopFrame.classList.add('active');
        try { desktopFrame.focus({ preventScroll: true }); } catch (_) {}
      }

      function update() {
        show(mql.matches);
      }

      if (typeof mql.addEventListener === 'function') mql.addEventListener('change', update);
      else if (typeof mql.addListener === 'function') mql.addListener(update);

      update();
    })();
  </script>
